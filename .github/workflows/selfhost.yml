name: ZCC Self-Host Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selfhost:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc make python3

      - name: Build zcc from parts
        run: |
          make zcc
          echo "Stage 1: parts -> zcc.c -> zcc OK"

      - name: Self-Host Verification — zcc2.s == zcc3.s
        run: |
          make selfhost

      - name: Upload assembly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selfhost-assembly-${{ github.sha }}
          path: |
            zcc2.s
            zcc3.s
          retention-days: 90
